command:
  - streamlit
  - run
  - app.py

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: STREAM_CATALOG_RAW
    value: workspace
  - name: SOURCE_SCHEMA
    value: default
  - name: SOURCE_TABLE
    value: sample_noisy
  - name: MONITOR_CATALOG
    value: workspace
  - name: MONITOR_SCHEMA
    value: default
  - name: MONITOR_INCIDENT_TABLE
    value: sample_monitor_incident
  - name: MONITOR_QUALITY_LOG_TABLE
    value: sample_monitor_log
  - name: MONITOR_INCIDENT_FEEDBACK_TABLE
    value: monitor_incident_feedback
  - name: STATION
    value: KAG
  - name: DATABRICKS_AI_GATEWAY_ENDPOINT
    value: agent-data-profiling
  - name: DATABRICKS_SUPERVISOR_AGENT_ENDPOINT
    value: mas-54cf16e8-endpoint
