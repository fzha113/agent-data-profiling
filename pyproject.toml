[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    ".databricks",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "ARG",
    "SIM",
    "PL",
    "N",
]
ignore = [
    "E501",
    "PLR0913",
    "PLR0914",
    "PLR0915",
    "PLR0917",
    "N812",
]

[tool.ruff.lint.per-file-ignores]
"jobs/*" = ["F821"]
"notebooks/*" = ["F821"]
"**/test_*.py" = ["PLR2004", "E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.isort]
known-first-party = [
    "agent_data_profiling",
    "config",
    "data_quality_monitoring",
    "jobs",
]
lines-after-imports = 2

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
