function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const container = document.getElementById('graph');
const nodeById = new Map(RAW_NODES.map(n => [n.id, n]));
const hiddenCommunities = new Set();
let selectedNodeId = null;
let Graph;

function sourceId(link) { return typeof link.source === 'object' ? link.source.id : link.source; }
function targetId(link) { return typeof link.target === 'object' ? link.target.id : link.target; }
function nodeColor(node) { return node.id === selectedNodeId ? '#ffffff' : node.color.background; }
function linkColor(link) { return link.confidence === 'INFERRED' ? '#f5c451' : (link.confidence === 'AMBIGUOUS' ? '#f87171' : '#8793a6'); }

function visibleGraphData() {
  const nodes = RAW_NODES
    .filter(n => !hiddenCommunities.has(n.community))
    .map(n => ({ ...n }));
  const ids = new Set(nodes.map(n => n.id));
  const links = RAW_EDGES
    .filter(e => ids.has(e.from) && ids.has(e.to))
    .map(e => ({ ...e, source: e.from, target: e.to }));
  return { nodes, links };
}

function liveNode(nodeId) {
  return Graph.graphData().nodes.find(n => n.id === nodeId);
}

function makeNodeLabel(node) {
  const sprite = new SpriteText(node.label);
  sprite.material.depthWrite = false;
  sprite.color = node.id === selectedNodeId ? '#ffffff' : node.color.background;
  sprite.textHeight = node.labelHeight;
  sprite.center.y = -1.15;
  return sprite;
}

function showInfo(nodeId) {
  const n = nodeById.get(nodeId);
  if (!n) return;
  const neighborIds = RAW_EDGES
    .filter(e => (e.from === nodeId || e.to === nodeId) && !hiddenCommunities.has(nodeById.get(e.from)?.community) && !hiddenCommunities.has(nodeById.get(e.to)?.community))
    .map(e => e.from === nodeId ? e.to : e.from);
  const seen = new Set();
  const neighborItems = neighborIds.filter(nid => {
    if (seen.has(nid)) return false;
    seen.add(nid);
    return true;
  }).map(nid => {
    const nb = nodeById.get(nid);
    const color = nb ? nb.color.background : '#555';
    return '<span class="neighbor-link" style="border-left-color:' + esc(color) + '" data-node-id="' + esc(nid) + '">' + esc(nb ? nb.label : nid) + '</span>';
  }).join('');
  document.getElementById('info-content').innerHTML =
    '<div class="field"><b>' + esc(n.label) + '</b></div>' +
    '<div class="field">Type: ' + esc(n.file_type || 'unknown') + '</div>' +
    '<div class="field">Community: ' + esc(n.community_name) + '</div>' +
    '<div class="field">Source: ' + esc(n.source_file || '-') + '</div>' +
    '<div class="field">Degree: ' + esc(n.degree) + '</div>' +
    (neighborItems ? '<div class="field" style="margin-top:8px;color:#aaa;font-size:11px">Neighbors (' + seen.size + ')</div><div id="neighbors-list">' + neighborItems + '</div>' : '');
}

function focusNode(nodeId) {
  selectedNodeId = nodeId;
  showInfo(nodeId);
  Graph.nodeColor(nodeColor).nodeThreeObject(makeNodeLabel);
  const n = liveNode(nodeId);
  if (n && Number.isFinite(n.x) && Number.isFinite(n.y) && Number.isFinite(n.z)) {
    const distance = 120;
    const distRatio = 1 + distance / (Math.hypot(n.x, n.y, n.z) || 1);
    Graph.cameraPosition({ x: n.x * distRatio, y: n.y * distRatio, z: n.z * distRatio }, n, 1000);
  }
}
window.focusNode = focusNode;

Graph = new ForceGraph3D(container, { controlType: 'orbit', rendererConfig: { antialias: true, alpha: false } })
  .width(container.clientWidth)
  .height(container.clientHeight)
  .graphData(visibleGraphData())
  .nodeId('id')
  .linkSource('source')
  .linkTarget('target')
  .backgroundColor('#0f0f1a')
  .showNavInfo(false)
  .nodeRelSize(2.8)
  .nodeVal('val')
  .nodeResolution(18)
  .nodeOpacity(0.9)
  .nodeColor(nodeColor)
  .nodeThreeObject(makeNodeLabel)
  .nodeThreeObjectExtend(true)
  .nodeLabel(node => '<div style="font:12px system-ui;line-height:1.35;color:#e0e0e0;background:rgba(15,15,26,0.94);padding:8px 10px;border:1px solid ' + node.color.background + ';border-radius:6px;max-width:260px"><b>' + esc(node.label) + '</b><br>' + esc(node.community_name) + '<br>Degree: ' + esc(node.degree) + '</div>')
  .linkColor(linkColor)
  .linkOpacity(0.42)
  .linkWidth(link => link.confidence === 'EXTRACTED' ? 0.65 : 0.4)
  .linkDirectionalArrowLength(link => sourceId(link) === targetId(link) ? 0 : 3)
  .linkDirectionalArrowRelPos(0.62)
  .linkDirectionalParticles(link => link.confidence === 'INFERRED' ? 1 : 0)
  .linkDirectionalParticleWidth(1.4)
  .linkDirectionalParticleSpeed(0.004)
  .linkLabel(link => '<div style="font:12px system-ui;line-height:1.35;color:#e0e0e0;background:rgba(15,15,26,0.94);padding:8px 10px;border-radius:6px">' + esc(link.label || link.relation || '') + '<br>' + esc(link.confidence || '') + '</div>')
  .onNodeClick(node => focusNode(node.id))
  .onNodeHover(node => { container.style.cursor = node ? 'pointer' : 'default'; })
  .onLinkHover(link => { container.style.cursor = link ? 'pointer' : 'default'; });

const charge = Graph.d3Force('charge');
if (charge) charge.strength(-150);
const linkForce = Graph.d3Force('link');
if (linkForce) linkForce.distance(58);
Graph.controls().autoRotate = true;
Graph.controls().autoRotateSpeed = 0.35;
setTimeout(() => Graph.zoomToFit(900, 30), 900);

const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES
    .filter(n => !hiddenCommunities.has(n.community) && n.label.toLowerCase().includes(q))
    .slice(0, 20);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  matches.forEach(n => {
    const el = document.createElement('div');
    el.className = 'search-item';
    el.textContent = n.label;
    el.style.borderLeft = '3px solid ' + n.color.background;
    el.style.paddingLeft = '8px';
    el.onclick = () => {
      focusNode(n.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(el);
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput) searchResults.style.display = 'none';
});
document.getElementById('info-content').addEventListener('click', e => {
  const item = e.target.closest('[data-node-id]');
  if (item) focusNode(item.dataset.nodeId);
});

const legendEl = document.getElementById('legend');
LEGEND.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = '<div class="legend-dot" style="background:' + c.color + '"></div>' +
    '<span class="legend-label">' + esc(c.label) + '</span>' +
    '<span class="legend-count">' + esc(c.count) + '</span>';
  item.onclick = () => {
    if (hiddenCommunities.has(c.cid)) {
      hiddenCommunities.delete(c.cid);
      item.classList.remove('dimmed');
    } else {
      hiddenCommunities.add(c.cid);
      item.classList.add('dimmed');
    }
    Graph.graphData(visibleGraphData());
    if (selectedNodeId && hiddenCommunities.has(nodeById.get(selectedNodeId)?.community)) {
      selectedNodeId = null;
      document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect it</span>';
    }
  };
  legendEl.appendChild(item);
});

window.addEventListener('resize', () => {
  Graph.width(container.clientWidth).height(container.clientHeight);
});
</script>
</body>
</html>
